name: Update Benchmark Results

on:
  workflow_dispatch:
    inputs:
      json_data:
        description: 'Benchmark JSON result (paste full JSON or leave empty to regenerate from results/ files)'
        required: false
        type: string
      filename:
        description: 'Filename for the result (e.g., vultr-tokyo-1gb.json). Required if json_data is provided.'
        required: false
        type: string
  push:
    paths:
      - 'results/*.json'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Save benchmark data (if provided)
        if: ${{ github.event.inputs.json_data != '' && github.event.inputs.filename != '' }}
        run: |
          echo '${{ github.event.inputs.json_data }}' > "results/${{ github.event.inputs.filename }}"
          echo "Saved benchmark data to results/${{ github.event.inputs.filename }}"

      - name: Generate README leaderboard
        run: node scripts/generate-readme.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Update benchmark results and leaderboard [automated]"
            git push
          fi
